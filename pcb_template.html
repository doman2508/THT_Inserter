<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>PCB</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        #main-container {
			display: flex;
			align-items: flex-start;
			height: calc(100vh - 85px); /* Odejmij wysokość przycisków */
		}

        #pcb-container {
			position: relative;
			flex: 0 0 auto;
			height: 100%;
			max-width: 50%; /* Domyślna wartość */
		}

        #pcb-image {
		display: block;
		width: 100%; /* Wypełnia szerokość kontenera */
		height: auto;
		/*height: 100%;*/ /* Obraz zajmuje 90% wysokości okna */
		max-width: 100%;
		object-fit: contain;
		}
		
        #pcb-canvas {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			/*height: 100%;*/
			height: auto;
			pointer-events: none;
		}

		#table-container {
			flex: 1 1 auto;
			overflow-y: auto;
			height: 100%;
		}

        #component-table {
            width: 100%;
            border-collapse: collapse;
        }

        #component-table th, #component-table td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
			vertical-align: top;
        }

        #component-table th {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #f5f5f5;
            cursor: pointer;
        }

        /* Styl dla podświetlonego wiersza tabeli */
        #component-table tr.highlight {
            background-color: #ffcccc;
        }

        #controls {
            padding: 10px;
        }

        #controls label {
            margin-right: 10px;
            font-size: 16px;
        }

        #controls input {
            width: 60px;
            padding: 5px;
            font-size: 16px;
            margin-right: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
        }
		
        #project-name {
            margin-left: 20px;
            font-weight: bold;
            font-size: 16px;
        }

        .desygnator-cell {
			word-break: normal;
			word-break: break-word; /* Zawijaj tekst, aby nie wychodził poza komórkę */
			white-space: normal;   /* Pozwala na zawijanie tekstu do wielu linii */
			overflow: visible;     /* Usuń ograniczenie overflow */
		}
		
		#image-wrapper {
			position: relative;
			display: inline-block;
			height: 100%; /* Dodane */
		}
		
    </style>
</head>
<body>

    <!-- Przyciski do sterowania -->
    <div id="controls">
        <label for="intervalInput">Czas/element (sekundy):</label>
        <input type="number" id="intervalInput" value="3" min="0.1" step="0.1"> wol
        <button onclick="startAutoProgression()">Start Auto</button>
        <button onclick="stopAutoProgression()">Stop Auto</button>
        <span id="project-name">Projekt: {{ project_name }}</span> <!-- Dodane -->
		<label for="pcbWidthRange"> Rozmiar </label>
		<input type="range" id="pcbWidthRange" min="10" max="100" value="50">
		<span id="pcbWidthValue">50%</span> <!-- Dodane do wyświetlenia wartości -->
    </div>

    <!-- Główny kontener -->
    <div id="main-container">
        <!-- Kontener obrazu PCB -->
        <div id="pcb-container">
			<div id="image-wrapper">
				<img id="pcb-image" src="{{ pcb_image }}" alt="Obraz płytki PCB">
				<canvas id="pcb-canvas"></canvas>
			</div>
		</div>

        <!-- Kontener tabeli komponentów -->
        <div id="table-container">
            <table id="component-table">
                <thead>
                    <tr>
                        <th>Lp.</th>
                        <th>Desygnator</th>
                        <th>Wartość</th>
                        <th>Indeks Medcom</th>
                        <th>Ilość</th>
                        <th>UWAGI</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Wiersze tabeli zostaną dodane przez JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
    var currentIndex = 0;
    var currentDesignators = null;
    var timer = null;
    var baseInterval = null;

    function init() {
        var tbody = document.querySelector('#component-table tbody');
        tableData.forEach(function(row, index) {
            var tr = document.createElement('tr');
            tr.setAttribute('data-index', index);
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td class="desygnator-cell">${row.Desygnator}</td>
                <td>${row['Wartość']}</td>
                <td>${row['Indeks Medcom']}</td>
                <td>${row.Ilość}</td>
                <td contenteditable="true">${row.UWAGI}</td>
            `;
            tr.addEventListener('click', function() {
                currentIndex = index;
                highlightCurrentLine();
            });
            tbody.appendChild(tr);
        });
        drawComponents();

        // Dodaj obsługę klawiatury
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowDown') {
                highlightNext();
            } else if (event.key === 'ArrowUp') {
                highlightPrevious();
            }
        });
    }

    function highlightNext() {
        currentIndex++;
        if (currentIndex >= tableData.length) {
            currentIndex = 0; // Powrót do pierwszej linii
        }
        highlightCurrentLine();
    }

    function highlightPrevious() {
        currentIndex--;
        if (currentIndex < 0) {
            currentIndex = tableData.length - 1; // Przejście do ostatniej linii
        }
        highlightCurrentLine();
    }

    function highlightCurrentLine() {
        // Usuń klasę 'highlight' z wszystkich wierszy
        var rows = document.querySelectorAll('#component-table tbody tr');
        rows.forEach(function(row) {
            row.classList.remove('highlight');
        });

        // Dodaj klasę 'highlight' do aktualnego wiersza
        var currentRow = rows[currentIndex];
        currentRow.classList.add('highlight');

        // Pobierz desygnatory dla aktualnej linii
        var designators = tableData[currentIndex].Desygnator;

        // Zapisz aktualne desygnatory
        currentDesignators = designators;

        // Podświetl komponenty
        highlightComponents(designators);

        // Przewiń do aktualnego wiersza
        currentRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function startAutoProgression() {
        if (!timer) {
            var intervalValue = parseFloat(document.getElementById('intervalInput').value);
            if (isNaN(intervalValue) || intervalValue <= 0) {
                alert('Proszę wprowadzić poprawny czas podstawowy (większy niż 0).');
                return;
            }
            baseInterval = intervalValue * 1000; // Konwersja na milisekundy
            autoProgression();
        }
    }

    function autoProgression() {
        highlightNext();
        var quantity = parseInt(tableData[currentIndex].Ilość) || 1;
        var interval = baseInterval * quantity;

        // Wyczyść poprzedni timer, jeśli istnieje
        if (timer) {
            clearTimeout(timer);
        }

        timer = setTimeout(autoProgression, interval);
    }

    function stopAutoProgression() {
        if (timer) {
            clearTimeout(timer);
            timer = null;
        }
    }

function drawComponents() {
    var canvas = document.getElementById('pcb-canvas');
    var ctx = canvas.getContext('2d');
    var image = document.getElementById('pcb-image');

    if (!image.complete) {
        image.onload = drawComponents;
        return;
    }

    // Ustaw rozmiar canvasu na podstawie wymiarów obrazu
    canvas.width = image.clientWidth;
    canvas.height = image.clientHeight;

    // Skalowanie współrzędnych komponentów
    var scaleX = canvas.width / pcbWidth;
    var scaleY = canvas.height / pcbHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    componentData.forEach(function(component) {
        ctx.fillStyle = 'rgba(0, 0, 255, 0.5)';
        var size = 10;

        var x = component.X * scaleX;
        var y = (pcbHeight - component.Y) * scaleY;

        ctx.fillRect(x - size / 2, y - size / 2, size, size);
    });
}

function highlightComponents(designators) {
    var canvas = document.getElementById('pcb-canvas');
    var ctx = canvas.getContext('2d');
    var image = document.getElementById('pcb-image');

    if (!image.complete) {
        image.onload = function() {
            highlightComponents(designators);
        };
        return;
    }

    // Set canvas size to match the displayed image size
    canvas.width = image.clientWidth;
    canvas.height = image.clientHeight;

    var scaleX = canvas.width / pcbWidth;
    var scaleY = canvas.height / pcbHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    var desigList = designators.split(',').map(function(d) { return d.trim(); });

    componentData.forEach(function(component) {
        var isHighlighted = desigList.includes(component.Desygnator);

        ctx.fillStyle = isHighlighted ? 'rgba(255, 0, 0, 0.7)' : 'rgba(0, 0, 255, 0.5)';
        var size = isHighlighted ? 30 : 10;

        var x = component.X * scaleX;
        var y = (pcbHeight - component.Y) * scaleY;

        ctx.fillRect(x - size / 2, y - size / 2, size, size);
    });
}


    // Dodaj nasłuchiwanie zdarzenia 'resize' po zdefiniowaniu funkcji
		window.addEventListener('resize', function() {
			drawComponents();

			if (currentDesignators) {
				highlightComponents(currentDesignators);
			}
		});

    // Uruchomienie funkcji inicjalizującej po załadowaniu strony
    window.onload = init;
    </script>

<script>
    var pcbImage = "{{ pcb_image }}";
    var pcbWidth = {{ pcb_width }};
    var pcbHeight = {{ pcb_height }};
    var tableData = {{ table_data | safe }};
    var componentData = {{ component_data | safe }};
	
	// Suwak do zmiany szerokości kontenera PCB
	document.getElementById("pcbWidthRange").addEventListener("input", function(event) {
    var widthPercentage = event.target.value + "%";
    document.getElementById("pcb-container").style.maxWidth = widthPercentage;

    // Wyświetl bieżącą wartość suwaka
    document.getElementById("pcbWidthValue").textContent = widthPercentage;

    // Ustaw rozmiar canvasu zgodnie z rozmiarem obrazu
    var canvas = document.getElementById('pcb-canvas');
    canvas.width = document.getElementById('pcb-image').clientWidth;
    canvas.height = document.getElementById('pcb-image').clientHeight;

    // Rysuj ponownie komponenty i podświetlenie
    drawComponents();
    if (currentDesignators) {
        highlightComponents(currentDesignators);
    }
});
</script>

</body>
</html>
